name: Deploy PriceWatch Lambda

# Ye workflow tab chalegi jab "lambda/pricewatch" folder ke andar kuch
# change ho aur "main" branch par push ho.
on:
  push:
    branches: [main]
    paths:
      - 'lambda/pricewatch/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Zip Lambda function code
        run: |
          cd lambda/pricewatch
          zip -r ../pricewatch.zip .
          cd ../..

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name pricewatch-fetcher \
            --zip-file fileb://lambda/pricewatch.zip \
            --region ap-southeast-2

      - name: Wait for the update to finish
        run: |
          aws lambda wait function-updated \
            --function-name pricewatch-fetcher \
            --region ap-southeast-2

      - name: Publish a new version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name pricewatch-fetcher \
            --region ap-southeast-2 \
            --query "Version" --output text)
          echo "New version published: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Point "prod" alias to the new version
        run: |
          aws lambda update-alias \
            --function-name pricewatch-fetcher \
            --name prod \
            --function-version ${{ steps.publish.outputs.version }} \
            --region ap-southeast-2

      - name: Verify deployment with a test invoke
        run: |
          aws lambda invoke \
            --function-name pricewatch-fetcher:prod \
            --region ap-southeast-2 \
            response.json
          cat response.json
